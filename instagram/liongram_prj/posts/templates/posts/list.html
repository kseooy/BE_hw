<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<body>
    <h1>덕멋 인스타그램</h1>
    <a href="{% url 'posts:create' %}">글 작성하기</a>
    <hr>

    <form action="{% url 'posts:result' %}" method="GET">
        <input type="text" name="search">
        <button type="submit">검색</button>
    </form>

    {% for post in posts %} 
        <h2><a href="{% url 'posts:detail' post.id %}">{{ post.title }}</a></h2>
        
        <p>{{ post.content }}</p>
        <p>조회수: {{ post.views }}</p>
        
        <p>작성일: {{ post.created_at|date:"Y년 n월 j일 g:i A" }}</p>
        <hr>
    {% endfor %}      
</body>
</html>
